name: BlinkBreak
options:
  bundleIdPrefix: com.shimondeitel.blinkbreak
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BlinkBreak:
    type: application
    platform: iOS
    sources:
      - path: BlinkBreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blinkbreak
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BlinkBreak/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BlinkBreakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlinkBreakTests
      - path: BlinkBreak.storekit
    dependencies:
      - target: BlinkBreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blinkbreak.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BlinkBreakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BlinkBreakUITests
    dependencies:
      - target: BlinkBreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blinkbreak.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BlinkBreak:
    build:
      targets:
        BlinkBreak: all
        BlinkBreakTests: [test]
        BlinkBreakUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BlinkBreak.storekit
    test:
      config: Debug
      storeKitConfiguration: BlinkBreak.storekit
      targets:
        - BlinkBreakTests
        - BlinkBreakUITests
    archive:
      config: Release
